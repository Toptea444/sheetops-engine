    <link id="app-manifest" rel="manifest" />
    <script>
      (function () {
        var isAdminPath = window.location.pathname.startsWith('/admin') || window.location.pathname.startsWith('/tl');
        var manifestLink = document.getElementById('app-manifest');
        var appleTitle = document.getElementById('apple-web-app-title');
        var manifestPath = isAdminPath ? '/manifest-admin.webmanifest?v=admin' : '/manifest.webmanifest?v=home';

        if (manifestLink) {
          manifestLink.setAttribute('href', manifestPath);
        }

        if (isAdminPath && appleTitle) {
          appleTitle.setAttribute('content', 'Bonus Admin');
        }
      })();
    </script>
    <link rel="apple-touch-icon" href="/pwa-icon-192.png" />
